<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Chimney - Service Intake Form</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f6f9;
margin:0;
padding:20px;
}

.container{
max-width:720px;
margin:auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 4px 16px rgba(0,0,0,0.08);
}

.logo{
display:block;
margin:auto;
max-width:220px;
margin-bottom:15px;
}

h1{
text-align:center;
color:#123b7a;
margin-bottom:5px;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:25px;
}

label{
display:block;
margin-top:16px;
font-weight:bold;
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:6px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
box-sizing:border-box;
}

textarea{
resize:vertical;
}

.hidden{
display:none;
}

button{
width:100%;
margin-top:28px;
padding:16px;
font-size:18px;
font-weight:bold;
color:white;
background:#123b7a;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#0f2f63;
}

</style>

</head>

<body>

<div class="container">

<img src="drchimney-logo.png" class="logo">

<h1>Dr. Chimney</h1>

<p class="subtitle">
Chimney & Fireplace Service Intake Form<br>
Please complete this form before your appointment.
</p>

<form action="https://formsubmit.co/eitangonen942@gmail.com" method="POST">

<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_subject" value="New Dr Chimney Intake Form">

<label>Full Name</label>
<input type="text" name="Full Name" required>

<label>Date</label>
<input type="date" name="Date">

<label>Address</label>
<input type="text" name="Address">

<label>Phone</label>
<input type="tel" name="Phone">

<label>Email</label>
<input type="email" name="Email">

<label>1. What issue are you experiencing?</label>
<select id="issue" name="Issue" onchange="toggleOther()">

<option>Fireplace not turning on</option>
<option>Weak or uneven flame</option>
<option>Gas smell</option>
<option>Strange noise from fireplace</option>
<option>Other</option>

</select>

<div id="otherBox" class="hidden">

<label>Please describe the issue</label>
<textarea name="Other Issue"></textarea>

</div>

<label>2. Do you smell gas near the fireplace?</label>
<select name="Gas Smell">

<option>Yes</option>
<option>No</option>
<option>Not sure</option>

</select>

<label>3. Approximately how old is the fireplace?</label>
<select name="Fireplace Age">

<option>Less than 10 years</option>
<option>10-20 years</option>
<option>20+ years</option>
<option>Not sure</option>

</select>

<label>4. When was the last time the fireplace was serviced?</label>
<select name="Last Service">

<option>Less than 1 year ago</option>
<option>1-3 years ago</option>
<option>More than 3 years ago</option>
<option>Not sure</option>

</select>

<label>5. When did the issue start?</label>
<select name="Issue Start">

<option>Recently</option>
<option>A few weeks ago</option>
<option>A few months ago</option>
<option>Long time</option>

</select>

<label>6. What type of fireplace do you have?</label>
<select name="Fireplace Type">

<option>Gas fireplace</option>
<option>Wood burning fireplace</option>
<option>Electric fireplace</option>
<option>Not sure</option>

</select>

<button type="submit">Submit Intake Form</button>

</form>

</div>

<script>

function toggleOther(){

var select=document.getElementById("issue");
var box=document.getElementById("otherBox");

if(select.value==="Other"){
box.style.display="block";
}
else{
box.style.display="none";
}

}

</script>

</body>
</html>
