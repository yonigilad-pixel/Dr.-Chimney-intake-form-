<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dr. Chimney - Chimney & Fireplace Service Intake Form</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f6f9;
      margin:0;
      padding:20px;
      color:#222;
    }

    .container{
      max-width:720px;
      margin:0 auto;
      background:#fff;
      border-radius:12px;
      padding:28px;
      box-shadow:0 4px 18px rgba(0,0,0,0.08);
    }

    .brand{
      text-align:center;
      margin-bottom:10px;
    }

    .brand h1{
      margin:0;
      font-size:34px;
      color:#123b7a;
    }

    .brand h2{
      margin:10px 0 0;
      font-size:28px;
      color:#123b7a;
      line-height:1.2;
    }

    .subtitle{
      text-align:center;
      color:#666;
      margin:14px 0 28px;
      font-size:17px;
      line-height:1.5;
    }

    label{
      display:block;
      margin-top:16px;
      font-weight:bold;
    }

    input, select, textarea{
      width:100%;
      padding:12px;
      margin-top:6px;
      border:1px solid #cfcfcf;
      border-radius:8px;
      font-size:16px;
      box-sizing:border-box;
      background:#fff;
    }

    textarea{
      resize:vertical;
      min-height:90px;
    }

    .hidden{
      display:none;
    }

    button{
      width:100%;
      margin-top:28px;
      padding:16px;
      font-size:18px;
      font-weight:bold;
      color:#fff;
      background:#123b7a;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    button:hover{
      background:#0f2f63;
    }

    .note{
      text-align:center;
      color:#666;
      font-size:13px;
      margin-top:18px;
      line-height:1.5;
    }

    @media (max-width: 600px){
      .container{
        padding:20px;
      }

      .brand h1{
        font-size:30px;
      }

      .brand h2{
        font-size:24px;
      }

      .subtitle{
        font-size:16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="brand">
      <h1>Dr. Chimney</h1>
      <h2>Chimney & Fireplace Service Intake Form</h2>
    </div>

    <p class="subtitle">
      Please complete this form before your appointment so we can prepare for your chimney or fireplace service visit.
    </p>

    <form action="https://formsubmit.co/eitangonen942@gmail.com" method="POST">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_subject" value="New Dr. Chimney Service Intake Form">

      <label for="fullName">Full Name</label>
      <input type="text" id="fullName" name="Full Name" required>

      <label for="date">Date</label>
      <input type="date" id="date" name="Date">

      <label for="address">Address</label>
      <input type="text" id="address" name="Address">

      <label for="phone">Phone</label>
      <input type="tel" id="phone" name="Phone">

      <label for="email">Email</label>
      <input type="email" id="email" name="Customer Email">

      <label for="issue">1. What issue are you experiencing with the fireplace?</label>
      <select id="issue" name="Issue" onchange="toggleOtherIssue()">
        <option value="Fireplace not turning on">Fireplace not turning on</option>
        <option value="Weak or uneven flame">Weak or uneven flame</option>
        <option value="Gas smell">Gas smell</option>
        <option value="Strange noise from fireplace">Strange noise from fireplace</option>
        <option value="Other">Other</option>
      </select>

      <div id="otherIssueBox" class="hidden">
        <label for="otherIssue">Please describe the issue</label>
        <textarea id="otherIssue" name="Other Issue"></textarea>
      </div>

      <label for="gasSmell">2. Do you smell gas near the fireplace?</label>
      <select id="gasSmell" name="Gas Smell Near Fireplace">
        <option value="Yes">Yes</option>
        <option value="No">No</option>
        <option value="Not sure">Not sure</option>
      </select>

      <label for="age">3. Approximately how old is the fireplace?</label>
      <select id="age" name="Approximate Fireplace Age">
        <option value="Less than 10 years">Less than 10 years</option>
        <option value="10-20 years">10–20 years</option>
        <option value="20+ years">20+ years</option>
        <option value="Not sure">Not sure</option>
      </select>

      <label for="lastService">4. When was the last time the fireplace was serviced?</label>
      <select id="lastService" name="Last Fireplace Service">
        <option value="Less than 1 year ago">Less than 1 year ago</option>
        <option value="1-3 years ago">1–3 years ago</option>
        <option value="More than 3 years ago">More than 3 years ago</option>
        <option value="Not sure">Not sure</option>
      </select>

      <label for="issueStart">5. When did the issue start?</label>
      <select id="issueStart" name="When Issue Started">
        <option value="Recently">Recently</option>
        <option value="A few weeks ago">A few weeks ago</option>
        <option value="A few months ago">A few months ago</option>
        <option value="Long time">Long time</option>
      </select>

      <label for="fireplaceType">6. What type of fireplace do you have?</label>
      <select id="fireplaceType" name="Fireplace Type">
        <option value="Gas fireplace">Gas fireplace</option>
        <option value="Wood burning fireplace">Wood burning fireplace</option>
        <option value="Electric fireplace">Electric fireplace</option>
        <option value="Not sure">Not sure</option>
      </select>

      <button type="submit">Submit Intake Form</button>
    </form>

    <div class="note">
      Dr. Chimney pre-appointment intake form
    </div>
  </div>

  <script>
    function toggleOtherIssue() {
      var select = document.getElementById("issue");
      var box = document.getElementById("otherIssueBox");
      box.style.display = select.value === "Other" ? "block" : "none";
    }
  </script>
</body>
</html>
